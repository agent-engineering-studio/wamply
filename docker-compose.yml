name: wcm

services:
  # ── Frontend ────────────────────────────────────────────
  frontend:
    container_name: wcm-frontend
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - SUPABASE_URL=${SUPABASE_URL:-http://supabase-kong:8000}
      - SUPABASE_INTERNAL_URL=http://supabase-kong:8000
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - AGENT_URL=${AGENT_URL:-http://agent:8000}
      - AGENT_SECRET=${AGENT_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-http://localhost:8100}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-${SUPABASE_ANON_KEY}}
      - NEXT_PUBLIC_ENABLE_GOOGLE_AUTH=${ENABLE_GOOGLE_AUTH:-false}
    depends_on:
      supabase-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wcm-network

  # ── Agent AI ────────────────────────────────────────────
  agent:
    container_name: wcm-agent
    build:
      context: ./agent
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./agent:/app
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${DATABASE_URL:-postgresql://supabase_admin@supabase-db:5432/postgres}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - SUPABASE_URL=${SUPABASE_URL:-http://supabase-rest:3001}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-5}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_FROM=${TWILIO_FROM:-whatsapp:+14155238886}
      - TWILIO_MESSAGING_SERVICE_SID=${TWILIO_MESSAGING_SERVICE_SID:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - AGENT_SECRET=${AGENT_SECRET}
    depends_on:
      supabase-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wcm-network

  # ── Backend API ─────────────────────────────────────────
  backend:
    container_name: wcm-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8200:8200"
    volumes:
      - ./backend:/app
      - backend_storage:/var/wamply-storage
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://supabase_admin:${POSTGRES_PASSWORD:-postgres}@supabase-db:5432/postgres}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - STORAGE_ROOT=/var/wamply-storage
      - JWT_SECRET=${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      - AGENT_SECRET=${AGENT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_TOPUP_SMALL=${STRIPE_PRICE_TOPUP_SMALL:-}
      - STRIPE_PRICE_TOPUP_MEDIUM=${STRIPE_PRICE_TOPUP_MEDIUM:-}
      - STRIPE_PRICE_TOPUP_LARGE=${STRIPE_PRICE_TOPUP_LARGE:-}
      - STRIPE_PRICE_TOPUP_XL=${STRIPE_PRICE_TOPUP_XL:-}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-5}
      - MOCK_LLM=${MOCK_LLM:-false}
      - SMTP_HOST=${SMTP_HOST:-mailhog}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_ADMIN_EMAIL:-admin@wcm.local}
      - SMTP_SENDER_NAME=${SMTP_SENDER_NAME:-Wamply}
      - APP_URL=${SITE_URL:-http://localhost:3000}
    depends_on:
      supabase-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wcm-network

  # ── Supabase PostgreSQL ─────────────────────────────────
  supabase-db:
    container_name: wcm-supabase-db
    image: supabase/postgres:15.8.1.060
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - supabase-data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U supabase_admin -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - wcm-network

  # ── Supabase Auth (GoTrue) ─────────────────────────────
  supabase-auth:
    container_name: wcm-supabase-auth
    image: supabase/gotrue:v2.170.0
    ports:
      - "9999:9999"
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://localhost:9999}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgresql://supabase_admin:${POSTGRES_PASSWORD:-postgres}@supabase-db:5432/postgres?search_path=auth
      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost:3000}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS:-}
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_PASSWORD_MIN_LENGTH: 10
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "false"
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-mailhog}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-1025}
      GOTRUE_SMTP_USER: ${SMTP_USER:-}
      GOTRUE_SMTP_PASS: ${SMTP_PASS:-}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL:-admin@wcm.local}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME:-Wamply}
      GOTRUE_SMTP_MAX_FREQUENCY: 1s
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: "/callback"
      GOTRUE_MAILER_SUBJECTS_CONFIRMATION: "Conferma la tua email Wamply"
      GOTRUE_MAILER_TEMPLATES_CONFIRMATION: "http://host.docker.internal:3000/email-templates/confirmation.html"
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: ${ENABLE_GOOGLE_AUTH:-false}
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: ${API_EXTERNAL_URL:-http://localhost:9999}/callback
    depends_on:
      supabase-db:
        condition: service_healthy
    networks:
      - wcm-network

  # ── Supabase REST (PostgREST) ───────────────────────────
  supabase-rest:
    container_name: wcm-supabase-rest
    image: postgrest/postgrest:v12.2.8
    ports:
      - "3001:3000"
    environment:
      PGRST_DB_URI: postgresql://supabase_admin:${POSTGRES_PASSWORD:-postgres}@supabase-db:5432/postgres
      PGRST_DB_SCHEMAS: public,storage
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      PGRST_DB_USE_LEGACY_GUCS: "false"
    depends_on:
      supabase-db:
        condition: service_healthy
    networks:
      - wcm-network

  # ── Supabase Realtime ───────────────────────────────────
  supabase-realtime:
    container_name: wcm-supabase-realtime
    image: supabase/realtime:v2.34.47
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      DB_HOST: supabase-db
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC: "false"
      API_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa15BLrx8etQoXz3gZv1/u2oq}
      ERL_AFLAGS: -proto_dist inet_tcp
      ENABLE_TAILSCALE: "false"
      DNS_NODES: "''"
    depends_on:
      supabase-db:
        condition: service_healthy
    profiles:
      - full
    networks:
      - wcm-network

  # ── Supabase Storage ────────────────────────────────────
  supabase-storage:
    container_name: wcm-supabase-storage
    image: supabase/storage-api:v1.14.6
    ports:
      - "5000:5000"
    environment:
      ANON_KEY: ${SUPABASE_ANON_KEY}
      SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      POSTGREST_URL: http://supabase-rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      DATABASE_URL: postgresql://supabase_admin:${POSTGRES_PASSWORD:-postgres}@supabase-db:5432/postgres
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
    volumes:
      - storage-data:/var/lib/storage
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-rest:
        condition: service_started
    profiles:
      - full
    networks:
      - wcm-network

  # ── Supabase Kong (API Gateway) ──────────────────────────
  supabase-kong:
    container_name: wcm-supabase-kong
    image: kong:3.9
    ports:
      - "8100:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
    volumes:
      - ./supabase/kong.yml:/var/lib/kong/kong.yml:ro
    depends_on:
      supabase-auth:
        condition: service_started
      supabase-rest:
        condition: service_started
    networks:
      - wcm-network

  # ── Redis Stack (cache + queue + vector search + RedisInsight) ─
  redis:
    container_name: wcm-redis
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - wcm-network

  # ── Mailhog (dev email) ────────────────────────────────
  mailhog:
    container_name: wcm-mailhog
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - wcm-network

  # ── Stripe CLI (webhook forwarding) ────────────────────
  stripe-cli:
    container_name: wcm-stripe-cli
    image: stripe/stripe-cli:latest
    command: listen --forward-to http://frontend:3000/api/billing/webhook --api-key ${STRIPE_SECRET_KEY}
    depends_on:
      - frontend
    profiles:
      - debug
    networks:
      - wcm-network

volumes:
  supabase-data:
  redis-data:
  storage-data:
  frontend_node_modules:
  backend_storage:

networks:
  wcm-network:
    driver: bridge
