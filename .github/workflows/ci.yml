name: ci

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  lint-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [ agent, backend ]
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package (editable + dev extras)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src

      - name: Pytest
        run: |
          if [ -d tests ]; then pytest -q; else echo "no tests yet"; fi

  lint-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Vitest
        run: npm test -- --run

  docker-build:
    runs-on: ubuntu-latest
    needs: [ lint-python, lint-frontend ]
    strategy:
      matrix:
        service:
          - { name: wcm-agent,    context: agent,    dockerfile: agent/Dockerfile    }
          - { name: wcm-backend,  context: backend,  dockerfile: backend/Dockerfile  }
          - { name: wcm-frontend, context: frontend, dockerfile: frontend/Dockerfile }
          # db-seed needs the repo root as context (it pulls supabase/migrations).
          - { name: wcm-db-seed,  context: .,        dockerfile: demo/db/Dockerfile  }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: false
          load: true
          tags: ${{ matrix.service.name }}:ci
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to:   type=gha,scope=${{ matrix.service.name }},mode=max

  demo-validate:
    # Catches drift between the dev-mode compose (root) and the demo standalone
    # bundle. kong.yml is duplicated by design (the demo folder must be self-
    # contained), so we enforce byte-for-byte equality. Also validates that
    # docker-compose.demo.yml parses with the bundled defaults.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: kong.yml in sync between supabase/ and demo/
        run: |
          if ! diff -u supabase/kong.yml demo/kong.yml; then
            echo "::error::demo/kong.yml has drifted from supabase/kong.yml."
            echo "Run: cp supabase/kong.yml demo/kong.yml"
            exit 1
          fi

      - name: docker compose -f demo/docker-compose.demo.yml config
        run: docker compose -f demo/docker-compose.demo.yml config --quiet
