_format_version: "1.1"

services:
  # ── Auth (GoTrue) ──────────────────────────────────────
  - name: auth-v1
    url: http://supabase-auth:9999
    routes:
      - name: auth-v1-routes
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors

  # ── REST (PostgREST) ───────────────────────────────────
  - name: rest-v1
    url: http://supabase-rest:3000
    routes:
      - name: rest-v1-routes
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors

  # ── Backend API (FastAPI) ──────────────────────────────
  - name: api-v1
    url: http://backend:8200
    routes:
      - name: api-v1-routes
        strip_path: true
        paths:
          - /api/v1/
    plugins:
      - name: cors

  # ── Agent (FastAPI) ────────────────────────────────────
  - name: agent-v1
    url: http://agent:8000
    routes:
      - name: agent-v1-routes
        strip_path: true
        paths:
          - /agent/v1/
    plugins:
      - name: cors
