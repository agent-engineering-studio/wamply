<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 1024" width="1536" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#1B2A4A"/>
      <stop offset="55%" stop-color="#132240"/>
      <stop offset="100%" stop-color="#0B1628"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.7" cy="0.3" r="0.7">
      <stop offset="0%"   stop-color="#0D9488" stop-opacity="0.30"/>
      <stop offset="55%"  stop-color="#0D9488" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0D9488" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#0D9488" stroke-width="0.5" opacity="0.10"/>
    </pattern>
  </defs>

  <rect width="1536" height="1024" fill="url(#bg)"/>
  <rect width="1536" height="1024" fill="url(#grid)"/>
  <rect width="1536" height="1024" fill="url(#glow)"/>

  <!-- decorative concentric rings, top-right -->
  <g opacity="0.10" transform="translate(1198.08,327.68)">
    <circle r="380" fill="none" stroke="#0D9488" stroke-width="1.5"/>
    <circle r="260" fill="none" stroke="#0D9488" stroke-width="1.5"/>
    <circle r="160" fill="none" stroke="#0D9488" stroke-width="1.5"/>
    <circle r="80"  fill="none" stroke="#0D9488" stroke-width="1.5"/>
  </g>

  <!-- icon, large and centered-left -->
  <g transform="translate(276.48,512.0)">
    <circle r="170" fill="#0D9488" opacity="0.10"/>
    <circle r="170" fill="none" stroke="#0D9488" stroke-width="1.5" opacity="0.40"/>
    
        <path d="M -120 30 L -100 -10 Q -80 -45 -40 -45 L 40 -45 Q 80 -45 100 -10 L 120 30 Z"
              fill="none" stroke="#5EEAD4" stroke-width="9" stroke-linejoin="round"/>
        <path d="M -90 -10 L -55 -35 L 0 -35 L 0 -10 Z M 0 -10 L 0 -35 L 55 -35 L 90 -10 Z"
              fill="none" stroke="#5EEAD4" stroke-width="6" opacity="0.7"/>
        <circle cx="-65" cy="35" r="22" fill="none" stroke="#5EEAD4" stroke-width="9"/>
        <circle cx=" 65" cy="35" r="22" fill="none" stroke="#5EEAD4" stroke-width="9"/>
        <circle cx="-65" cy="35" r="6" fill="#5EEAD4"/>
        <circle cx=" 65" cy="35" r="6" fill="#5EEAD4"/>
    
  </g>

  <!-- segment label -->
  <text x="552.96" y="471.04"
        font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500"
        fill="#94A3B8" letter-spacing="6">PER</text>
  <text x="552.96" y="614.4"
        font-family="Inter, system-ui, sans-serif" font-size="76" font-weight="700"
        fill="#FFFFFF" letter-spacing="-1.5">Autosaloni</text>
  <text x="552.96" y="696.32"
        font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400"
        fill="#94A3B8" letter-spacing="2">Wam<tspan fill="#5EEAD4">ply</tspan> per il tuo settore</text>
</svg>
